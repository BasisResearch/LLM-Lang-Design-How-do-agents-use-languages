name: todo-server
version: 0.1.0.0
license: BSD3
build-type: Simple
cabal-version: ">=1.10"

executable todo-server
  main-is: Main.hs
  default-language: Haskell2010
  build-depends:
      base >=4.12 && <5
    , scotty >=1.7
    , aeson >=2.0
    , text >=1.2
    , bytestring >=0.10
    , containers >=0.6
    , stm >=2.5
    , time >=1.9
    , uuid >=1.3
    , uuid-types >=1.0
    , wai >=3.2
    , warp >=3.3
    , http-types >=0.12

  ghc-options: -O2 -threaded -Wall
