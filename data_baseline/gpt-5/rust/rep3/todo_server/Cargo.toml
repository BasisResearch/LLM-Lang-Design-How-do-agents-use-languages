[package]
name = "todo_server"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = { version = "0.7", features = ["macros"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["clock"] }
regex = "1"
parking_lot = "0.12"
clap = { version = "4", features = ["derive"] }
cookie = "0.18"
thiserror = "1"
