[package]
name = "todo_app"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = "0.7"
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.0", features = ["v4"] }
regex = "1.0"
chrono = "0.4"
axum-extra = { version = "0.9", features = ["cookie"] }
clap = { version = "4.0", features = ["derive"] }