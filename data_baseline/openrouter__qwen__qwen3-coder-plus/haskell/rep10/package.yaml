name:                todo-app
version:             0.1.0.0
github:              "githubuser/todo-app"
license:             BSD3
author:              "Author name here"
maintainer:          "example@example.com"
copyright:           "2025 Author name here"

extra-source-files:
- README.md
- ChangeLog.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/githubuser/todo-app#readme>

dependencies:
- base >= 4.7 && < 5
- wai
- warp
- scotty
- text
- blaze-markup
- blaze-html
- aeson
- aeson-pretty
- bytestring
- http-types
- cookie
- time
- containers
- uuid
- uuid-types
- cryptonite
- memory
- crypto-kripke  

library:
  source-dirs: src

executables:
  todo-app-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - todo-app
    - wai
    - warp
    - scotty
    - text
    - aeson
    - aeson-pretty
    - bytestring
    - http-types
    - cookie
    - time
    - containers
    - uuid
    - uuid-types
    - cryptonite
    - memory

tests:
  todo-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - todo-app
    - hspec